# Cola de temas para ownthatcheck. Consumida por Etapa 0 del playbook
# (agents/ORCHESTRATOR_AGENT/AUTOMATED_RUN_PLAYBOOK.md). El Research de cada
# corrida toma el primer `status: pending` en orden de archivo, investiga
# fuentes reales para ESE tema, y no lo cambia por otro salvo que ya no sea
# defendible (en cuyo caso queda `blocked` con motivo, no se reintenta solo).
#
# Receta de 3 archivos por post (blog-posts.ts + articles/{slug}.tsx +
# articles/index.tsx) en sites/ownthatcheck/AUDIT.md — "Receta del Writer".
# sitemap.ts y public/llms.txt siguen protegidos: cada publicación necesita
# el paso manual de indexación que ya documenta el AUDIT.
#
# Armada 2026-07-22 contra el inventario real de 51 posts existentes.
# Recargar cuando queden pocos `pending`.

