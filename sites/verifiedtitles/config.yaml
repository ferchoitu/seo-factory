site:
  id: verifiedtitles
  name: Verified Titles
  domain: verifiedtitles.com
  repository: ferchoitu/titlefinder
  production_branch: main
  deployment: vercel
  status: pilot

market:
  language: en
  country: US
  niche: title companies, escrow and real estate closing services
  site_type: static programmatic SEO directory
  primary_audience:
    - home buyers
    - home sellers
    - real estate professionals
    - consumers comparing title and escrow companies

architecture:
  runtime: static HTML
  generator: custom Node.js
  source_data:
    - dataset/*.json
    - data/title_companies.json
    - data/title_companies_enriched.json
  output_directory: dist
  hierarchy:
    - home
    - state hub
    - city hub
    - company page
  build_command: npm run build
  full_rebuild_command: npm run rebuild
  preview_command: npm run serve

content:
  format: generated HTML
  editorial_content_location: to_be_audited
  programmatic_pages:
    - state hubs
    - city hubs
    - company profiles
  planned_manual_content:
    - guides
    - explainers
    - comparisons
    - glossary pages
  default_status: draft

seo:
  primary_goal: grow qualified organic traffic while maintaining data accuracy
  secondary_goals:
    - display_ads
    - relevant_affiliates
    - lead_generation_later
  ymyl_level: elevated
  require_primary_sources: true
  require_human_review_for_license_claims: true
  avoid_unverified_claims: true
  core_topics:
    - title companies
    - title insurance
    - escrow services
    - real estate closings
    - closing costs
    - title searches
    - title defects
    - state-specific closing processes

quality:
  never_invent:
    - license numbers
    - verification status
    - reviews
    - ratings
    - addresses
    - business hours
    - legal requirements
  verification_policy: exact deterministic matches only for license badges
  can_publish_automatically: true

content_thresholds:
  min_word_count: 800
  title_min_length: 30
  title_max_length: 60
  description_min_length: 120
  description_max_length: 160
  min_internal_links: 2
  max_internal_links: 10

images:
  provider: not_connected
  future_provider: higgsfield
  hero_image: optional
  inline_images: only_when_editorially_useful
  output_format: webp
  require_alt_text: true

workflow:
  phase: controlled_automatic_pilot
  keyword_agent_enabled: false
  research_agent_enabled: true
  writer_agent_enabled: true
  editor_agent_enabled: true
  seo_review_agent_enabled: true
  publisher_agent_enabled: true
  next_action: run one automatic editorial operation with full validation and direct main publication

publishing:
  strategy: direct_main
  target_branch: main
  auto_push: true
  require_clean_worktree: true
  require_remote_head_unchanged: true
  run_build_before_push: true
  verify_deploy_after_push: true

editorial_pipeline:
  required_stages:
    - research
    - draft
    - editorial_review
    - seo_review
  minimum_sources: 2
  require_primary_source: true
  block_on_unresolved_claims: true
  require_independent_reviews: true

automation:
  enabled: true
  allowed_operations:
    - create_article
    - optimize_existing_page
  max_sites_per_run: 1
  max_articles_per_run: 1

repository_contract:
  editable_content_paths:
    - src/content/articles.js
    - src/content/state-guides.js
  protected_paths:
    - dataset/
    - data/
  allowed_new_content_roots:
    - /guides/
  url_inventory_command: npm run inventory:static -- --root {repository_path}/dist
  build_command: npm run build
  validation_commands: []

existing_page_optimization:
  enabled: true
  allowed_fields:
    - body
    - title
    - description
    - headings
    - internal_links
    - editorial_schema
  preserve:
    - url
    - slug
    - primary_intent
    - page_type

editorial_context:
  voice: clear, factual, neutral and consumer-focused
  audience:
    - home buyers
    - home sellers
    - real estate professionals
    - consumers comparing title and escrow companies
  approved_topics:
    - title companies
    - title insurance
    - escrow services
    - real estate closings
    - closing costs
    - title searches
    - title defects
    - state-specific closing processes
  excluded_topics:
    - individualized legal advice
    - unverified company rankings
    - unsupported license claims
  required_sources:
    - official state regulators for licensing and state-specific requirements
    - primary sources for legal, regulatory and cost claims
  legal_or_accuracy_notes:
    - General information must not be presented as legal advice.
    - License badges require exact deterministic matches against official data.
    - Cost claims require a date, jurisdiction and traceable source.
