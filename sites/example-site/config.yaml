site:
  name: Example Site
  domain: example.com
  repository: owner/example-site
  default_branch: main
  framework: nextjs
  deployment: vercel

market:
  language: en
  country: US
  niche: replace-me
  audience: replace-me

content:
  content_directory: content/blog
  file_extension: mdx
  posts_per_batch: 1
  requires_human_approval: false
  categories: []
  excluded_topics: []

seo:
  primary_goal: organic_traffic
  monetization:
    display_ads: true
    affiliates: true
  minimum_volume: null
  maximum_difficulty: null

images:
  enabled: false
  provider: higgsfield
  hero_required: true
  inline_images_max: 3
  output_format: webp
  style_notes: "Define the visual identity before enabling generation."

publishing:
  strategy: direct_main
  target_branch: main
  auto_push: true
  require_clean_worktree: true
  require_remote_head_unchanged: true
  run_build_before_push: true
  verify_deploy_after_push: true

editorial_pipeline:
  required_stages:
    - research
    - draft
    - editorial_review
    - seo_review
  minimum_sources: 2
  require_primary_source: true
  block_on_unresolved_claims: true
  require_independent_reviews: true

automation:
  enabled: false
  allowed_operations:
    - create_article
    - optimize_existing_page
  max_sites_per_run: 1
  max_articles_per_run: 1

repository_contract:
  editable_content_paths: []
  protected_paths: []
  allowed_new_content_roots: []
  url_inventory_command: null
  build_command: null
  validation_commands: []

existing_page_optimization:
  enabled: true
  allowed_fields:
    - body
    - title
    - description
    - headings
    - internal_links
    - editorial_schema
  preserve:
    - url
    - slug
    - primary_intent
    - page_type

editorial_context:
  voice: null
  audience: []
  approved_topics: []
  excluded_topics: []
  required_sources: []
  legal_or_accuracy_notes: []
